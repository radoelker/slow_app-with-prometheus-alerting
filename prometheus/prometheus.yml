global:
  scrape_interval: 5s
  evaluation_interval: 5s
 
scrape_configs:
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
 
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
 
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
 
rule_files:
  - '/etc/prometheus/rules/*.yml'
